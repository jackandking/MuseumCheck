<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博物馆打卡 - MuseumCheck</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-YHF52B1NMH"></script>
    <script>
        // Google Analytics 4 Configuration
        window.GA_MEASUREMENT_ID = 'G-YHF52B1NMH';
        
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', window.GA_MEASUREMENT_ID);
    </script>
    
    <!-- Baidu Analytics (百度统计) -->
    <script>
        // Baidu Analytics Configuration
        // Replace 'YOUR_BAIDU_TRACKING_ID' with your actual Baidu Analytics tracking ID
        // 请将 'YOUR_BAIDU_TRACKING_ID' 替换为您的实际百度统计跟踪ID
        var _hmt = _hmt || [];
        (function() {
            var hm = document.createElement("script");
            hm.src = "https://hm.baidu.com/hm.js?10856afa2ea23687b7e8f5b901795c57";
            var s = document.getElementsByTagName("script")[0]; 
            s.parentNode.insertBefore(hm, s);
        })();
    </script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏛️ 博物馆打卡</h1>
            <p class="subtitle">让孩子爱上博物馆之旅</p>
        </header>

        <nav class="age-selector">
            <div class="selector-group">
                <label>语言 / Language:</label>
                <select id="languageSelector">
                    <option value="zh-CN">中文</option>
                    <option value="en-US">English</option>
                </select>
            </div>
            <div class="selector-group">
                <label>孩子年龄：</label>
                <select id="ageGroup">
                    <option value="3-6">3-6岁 (学龄前)</option>
                    <option value="7-12">7-12岁 (小学)</option>
                    <option value="13-18">13-18岁 (中学)</option>
                </select>
            </div>
        </nav>

        <main>
            <section class="museum-list">
                <h2>全国主要博物馆清单</h2>
                <div class="stats">
                    <span id="visitedCount">0</span>/<span id="totalCount">0</span> <span id="visitedLabel">已参观</span>
                    (<span id="visitedPercentage">0</span>%)
                </div>
                <div id="museumGrid" class="museum-grid">
                    <!-- Museums will be populated by JavaScript -->
                </div>
            </section>
        </main>
    </div>

    <div id="museumModal" class="modal hidden">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalTitle"></h2>
            <div id="modalContent"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
